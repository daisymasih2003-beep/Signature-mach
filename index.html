<!DOCTYPE html>
<html>
<head>
    <title>Signature Matching System</title>
</head>

<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0;">

    <div style="
        width:400px;
        margin:50px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    ">

        <h2 style="
            text-align:center;
            color:#333;
            margin-bottom:25px;
        ">
            Signature Matching System
        </h2>

        <form method="POST" enctype="multipart/form-data">

            <label style="font-weight:bold; color:#555;">
                Upload Signature 1
            </label><br><br>

            <input 
                type="file" 
                name="image1" 
                required
                style="
                    width:100%;
                    padding:10px;
                    border:1px solid #ccc;
                    border-radius:5px;
                    margin-bottom:20px;
                "
            >

            <label style="font-weight:bold; color:#555;">
                Upload Signature 2
            </label><br><br>

            <input 
                type="file" 
                name="image2" 
                required
                style="
                    width:100%;
                    padding:10px;
                    border:1px solid #ccc;
                    border-radius:5px;
                    margin-bottom:25px;
                "
            >

            <button 
                type="submit"
                style="
                    width:100%;
                    padding:12px;
                    background:#007bff;
                    color:white;
                    border:none;
                    border-radius:5px;
                    font-size:16px;
                    cursor:pointer;
                "
            >
                Compare Signatures
            </button>

        </form>

        {% if similarity %}

        <div style="
            margin-top:25px;
            padding:15px;
            background:#f8f9fa;
            border-radius:8px;
            text-align:center;
        ">

            <h3 style="color:#333;">
                Similarity Score:
                <span style="color:#007bff;">
                    {{ similarity }}
                </span>
            </h3>

            {% if similarity > 70 %}

            <p style="
                color:green;
                font-size:20px;
                font-weight:bold;
            ">
                ✅ Signatures Match
            </p>

            {% else %}

            <p style="
                color:red;
                font-size:20px;
                font-weight:bold;
            ">
                ❌ Signatures Do Not Match
            </p>

            {% endif %}

        </div>

        {% endif %}

    </div>

</body>
</html>
